<script>

//
// 日本時間表示
//

function updateJapanTime(){

const now = new Date();

const japan = new Date(
now.toLocaleString("en-US",{timeZone:"Asia/Tokyo"})
);

const time = document.getElementById("japan-time");

if(time){
time.innerText = japan.toLocaleTimeString();
}

}

setInterval(updateJapanTime,1000);
updateJapanTime();


//
// PayPal Button
//

function createPaypalButton(containerId){

paypal.Buttons({

style:{
layout:"vertical",
color:"gold",
shape:"rect",
label:"paypal"
},

createOrder:function(data,actions){

return actions.order.create({

purchase_units:[{

amount:{
value:"180"
}

}]

});

},

onApprove:function(data,actions){

return actions.order.capture().then(function(details){

alert("Transaction completed by "+details.payer.name.given_name);

});

},

onError:function(err){

console.error(err);
alert("PayPal error");

}

}).render("#"+containerId);

}


// 上下2箇所にボタン生成

if(window.paypal){

createPaypalButton("paypal-button-container-top");

createPaypalButton("paypal-button-container-bottom");

}
